[theme]
primaryColor = "#003DA5"
backgroundColor = "#0F1419"
secondaryBackgroundColor = "#1A1F2E"
textColor = "#FFFFFF"
font = "sans serif"

[client]
showErrorDetails = true
logger.level = "info"

[logger]
level = "info"

[server]
headless = true
port = 8501
runOnSave = true
maxUploadSize = 200

[browser]
gatherUsageStats = true
gatherViaServerStats = true
